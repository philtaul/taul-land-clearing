<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TLC Business Card — Jon Taul</title>
  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #e8e4dc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      min-height: 100vh;
    }

    h2 {
      color: #1a3a2a;
      margin: 0;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .card {
      width: 3.5in;
      height: 2in;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      position: relative;
    }

    /* ── FRONT ── */
    .card-front {
      background: linear-gradient(145deg, #1a3a2a 0%, #2d5a3f 60%, #1a3a2a 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0.5in 0.4in;
      text-align: center;
    }

    .card-front::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('images/hero-mulcher.jpg') center/cover;
      opacity: 0.12;
    }

    .card-front * { position: relative; z-index: 1; }

    .logo-text {
      font-size: 2rem;
      font-weight: 800;
      color: #c4a265;
      letter-spacing: 4px;
      line-height: 1;
    }

    .company-name {
      font-size: 0.55rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-top: 0.2rem;
    }

    .front-divider {
      width: 40px;
      height: 2px;
      background: #c4a265;
      margin: 0.3rem 0;
    }

    .tagline {
      font-size: 0.45rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* ── BACK ── */
    .card-back {
      background: #fff;
      color: #2c2c2c;
      padding: 0.35in 0.4in;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .back-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .person-name {
      font-size: 0.75rem;
      font-weight: 800;
      color: #1a3a2a;
      line-height: 1.2;
    }

    .person-title {
      font-size: 0.42rem;
      color: #8b6f47;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    .back-logo {
      font-size: 0.85rem;
      font-weight: 800;
      color: #c4a265;
      letter-spacing: 2px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.15rem 0.4rem;
      margin-top: auto;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.15rem;
    }

    .contact-icon {
      font-size: 0.4rem;
      width: 0.55rem;
      text-align: center;
      flex-shrink: 0;
    }

    .contact-text {
      font-size: 0.38rem;
      color: #444;
      line-height: 1.3;
    }

    .contact-text strong {
      color: #1a3a2a;
      font-size: 0.34rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
    }

    .services-bar {
      background: #1a3a2a;
      padding: 0.12rem 0;
      text-align: center;
      margin: 0.2rem -0.4in 0;
      width: calc(100% + 0.8in);
    }

    .services-bar span {
      font-size: 0.3rem;
      color: #c4a265;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .accent-stripe {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #c4a265, #8b6f47);
    }

    /* ── PRINT HELPERS ── */
    .label {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    @media print {
      body { background: #fff; padding: 0.5in; }
      .card { box-shadow: none; border: 1px solid #ccc; }
      .label { display: none; }
    }
  </style>
</head>
<body>

  <h2>Front</h2>
  <div class="card card-front">
    <div class="logo-text">TLC</div>
    <div class="company-name">Taul Land Clearing</div>
    <div class="front-divider"></div>
    <div class="tagline">Brush Clearing &bull; Forestry Mulching &bull; Land Clearing</div>
  </div>

  <h2>Back</h2>
  <div class="card card-back">
    <div class="back-header">
      <div>
        <div class="person-name">Jon Taul</div>
        <div class="person-title">Owner / Operator</div>
      </div>
      <div class="back-logo">TLC</div>
    </div>

    <div class="contact-grid">
      <div class="contact-item">
        <span class="contact-icon">&#9742;</span>
        <div class="contact-text">
          <strong>Phone</strong>
          (555) 555-5555
        </div>
      </div>
      <div class="contact-item">
        <span class="contact-icon">&#9993;</span>
        <div class="contact-text">
          <strong>Email</strong>
          jon@taullandclearing.com
        </div>
      </div>
      <div class="contact-item">
        <span class="contact-icon">&#9679;</span>
        <div class="contact-text">
          <strong>Web</strong>
          taullandclearing.com
        </div>
      </div>
      <div class="contact-item">
        <span class="contact-icon">&#9873;</span>
        <div class="contact-text">
          <strong>Service Area</strong>
          Central Kentucky
        </div>
      </div>
    </div>

    <div class="services-bar">
      <span>Forestry Mulching &bull; Brush Clearing &bull; Lot Prep &bull; Trail Clearing</span>
    </div>
    <div class="accent-stripe"></div>
  </div>

</body>
</html>
